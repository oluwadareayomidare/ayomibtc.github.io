<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyomiBTC - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: #ffffff; width: 100%; max-width: 450px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); overflow: hidden; }
        .auth-header { background-color: #1a237e; color: #ffffff; padding: 30px 20px; text-align: center; }
        .auth-header h2 { font-size: 24px; margin-bottom: 5px; }
        .auth-header p { font-size: 14px; opacity: 0.8; }
        .auth-body { padding: 40px 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #1a237e; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; outline: none; }
        .form-group input:focus { border-color: #1a237e; }
        .auth-btn { width: 100%; padding: 14px; background-color: #1a237e; color: #ffffff; border: none; border-radius: 4px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .auth-btn:hover { background-color: #111540; }
        .switch-mode { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .switch-mode a { color: #1a237e; text-decoration: none; font-weight: 600; }
        .back-home { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h2>Create An Account</h2>
            <p>Join AyomiBTC for financial growth programs</p>
        </div>
        <div class="auth-body">
            <form onsubmit="event.preventDefault(); alert('Registration successful! Welcome to AyomiBTC.'); window.location.href='index.html';">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">REGISTER NOW</button>
            </form>
            <p class="switch-mode">Already have an account? <a href="#" onclick="alert('Switching to login form...');">Sign In</a></p>
            <a href="index.html" class="back-home">← Back to Homepage</a>
        </div>
    </div>

</body>
</html>
